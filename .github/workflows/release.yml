name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and sign
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    env:
      UPDATE_PUBLIC_KEY: ${{ vars.UPDATE_PUBLIC_KEY }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Validate release inputs
        run: |
          set -eu
          test -n "$UPDATE_PUBLIC_KEY" || { echo "Release variable UPDATE_PUBLIC_KEY is required" >&2; exit 1; }
          version="${GITHUB_REF_NAME#v}"
          test "$version" != "$GITHUB_REF_NAME" || { echo "Release tag must start with v" >&2; exit 1; }
          build_time="$(git show -s --format=%cI "$GITHUB_SHA")"
          printf 'VERSION=%s\n' "$version" >> "$GITHUB_ENV"
          printf 'BUILD_TIME=%s\n' "$build_time" >> "$GITHUB_ENV"
          printf 'AMD64_ASSET=visitortrace-%s-linux-amd64\n' "$version" >> "$GITHUB_ENV"
          printf 'ARM64_ASSET=visitortrace-%s-linux-arm64\n' "$version" >> "$GITHUB_ENV"
      - name: Test tagged source
        run: |
          go mod verify
          go test ./...
          go vet ./...
      - name: Build release executables
        env:
          CGO_ENABLED: "0"
        run: |
          set -eu
          mkdir dist
          ldflags="-s -w -X github.com/zzaiyan/VisitorTrace/internal/buildinfo.Version=$VERSION -X github.com/zzaiyan/VisitorTrace/internal/buildinfo.Commit=$GITHUB_SHA -X github.com/zzaiyan/VisitorTrace/internal/buildinfo.BuildTime=$BUILD_TIME -X github.com/zzaiyan/VisitorTrace/internal/buildinfo.UpdatePublicKey=$UPDATE_PUBLIC_KEY"
          GOOS=linux GOARCH=amd64 go build -buildvcs=false -trimpath -ldflags "$ldflags" -o "dist/$AMD64_ASSET" ./cmd/visitortrace
          GOOS=linux GOARCH=arm64 go build -buildvcs=false -trimpath -ldflags "$ldflags" -o "dist/$ARM64_ASSET" ./cmd/visitortrace
          "dist/$AMD64_ASSET" version --json
          cp LICENSE dist/LICENSE
          git archive \
            --format=tar.gz \
            --prefix="visitortrace-$VERSION/" \
            --output="dist/visitortrace-$VERSION-source.tar.gz" \
            "$GITHUB_SHA"
      - name: Create unsigned manifest
        run: |
          set -eu
          go run ./tools/release-manifest generate \
            --version "$VERSION" \
            --published-at "$BUILD_TIME" \
            --asset "linux-amd64=dist/$AMD64_ASSET" \
            --asset "linux-arm64=dist/$ARM64_ASSET" \
            --output "$RUNNER_TEMP/manifest.unsigned.json"
      - name: Sign and verify manifest
        env:
          UPDATE_PRIVATE_KEY: ${{ secrets.UPDATE_PRIVATE_KEY }}
        run: |
          set -eu
          test -n "$UPDATE_PRIVATE_KEY" || { echo "Release secret UPDATE_PRIVATE_KEY is required" >&2; exit 1; }
          private_key="$RUNNER_TEMP/update.ed25519"
          trap 'rm -f "$private_key"' EXIT
          umask 077
          printf '%s\n' "$UPDATE_PRIVATE_KEY" > "$private_key"
          go run ./tools/release-manifest sign \
            --private-key "$private_key" \
            --manifest "$RUNNER_TEMP/manifest.unsigned.json" \
            --output dist/manifest.json
          go run ./tools/release-manifest verify \
            --public-key "$UPDATE_PUBLIC_KEY" \
            --manifest dist/manifest.json
          cd dist
          sha256sum \
            "$AMD64_ASSET" \
            "$ARM64_ASSET" \
            "visitortrace-$VERSION-source.tar.gz" \
            LICENSE \
            manifest.json > checksums.txt
      - name: Stage release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: dist
      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          prerelease=""
          case "$version" in
            *-*) prerelease="--prerelease" ;;
          esac
          if draft="$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null)"; then
            test "$draft" = "true" || { echo "Release already exists and is not a draft" >&2; exit 1; }
            gh release upload "$GITHUB_REF_NAME" \
              dist/visitortrace-*-linux-amd64 \
              dist/visitortrace-*-linux-arm64 \
              dist/visitortrace-*-source.tar.gz \
              dist/LICENSE \
              dist/manifest.json \
              dist/checksums.txt \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/visitortrace-*-linux-amd64 \
              dist/visitortrace-*-linux-arm64 \
              dist/visitortrace-*-source.tar.gz \
              dist/LICENSE \
              dist/manifest.json \
              dist/checksums.txt \
              --draft \
              --verify-tag \
              --generate-notes \
              --title "VisitorTrace $GITHUB_REF_NAME" \
              $prerelease
          fi
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          latest=""
          case "$version" in
            *-*) ;;
            *) latest="--latest" ;;
          esac
          gh release edit "$GITHUB_REF_NAME" --draft=false $latest
