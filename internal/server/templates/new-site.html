{{define "content"}}
<header class="page-header">
  <div><p class="eyebrow">SITE</p><h1>{{t "new_site"}}</h1></div>
  <a class="button ghost" href="/admin">{{t "cancel"}}</a>
</header>
<section class="form-panel narrow">
  <form method="post" action="/admin/sites/new" class="stack-form">
    <input type="hidden" name="csrf" value="{{.CSRF}}">
    <label class="field"><span>{{t "display_name"}}</span><input type="text" name="name" maxlength="100" value="{{.Name}}" required></label>
    <label class="field"><span>Allowed Origins</span><textarea name="origins" rows="4" spellcheck="false" required>{{.Origins}}</textarea><small>{{t "origin_hint"}}</small></label>
    <label class="field"><span>{{t "iana_timezone"}}</span><input type="text" name="timezone" value="{{.Timezone}}" required></label>
    <div class="field-grid two">
      <label class="field"><span>{{t "dedup_window"}}</span><div class="input-unit"><input type="number" name="dedup_window_days" min="1" max="30" value="{{.DedupWindowDays}}" required><span>{{t "day"}}</span></div></label>
      <label class="field"><span>{{t "record_retention"}}</span><div class="input-unit"><input type="number" name="retention_days" min="1" max="90" value="{{.RetentionDays}}" required><span>{{t "day"}}</span></div></label>
    </div>
    <div class="form-actions"><button class="button primary" type="submit">{{t "create_site"}}</button></div>
  </form>
</section>
{{end}}
